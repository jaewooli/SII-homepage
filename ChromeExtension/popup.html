<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>SII Auth Popup</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="popup.css">
  <script src="popup.js"></script>
</head>
<body>
  <header class="popup-header">
    <img src="/images/sii-logo-64.png" alt="SII Logo" class="logo">
    <h2>SII Auth Panel</h2>
  </header>

  <main class="popup-main">
    <section id="login">
      <div class="msg-container">
        <div class="msg"></div>
      </div>

      <!-- Login Redirect Section -->
      <div class="login-redirect-container">
        <p class="login-instruction">연동을 활성화하려면 먼저 SII 홈페이지에 로그인해야 합니다.</p>
        <button id="open-homepage-btn" class="btn-primary">SII 홈페이지 로그인</button>
      </div>

      <div class="support-section">
        <p>계정이 없으신가요? <a href="#" id="support-link">관리자 문의 (Support)</a></p>
      </div>
    </section>

    <!-- Logged In Section -->
    <section id="loggedin" class="hidden">
      <div class="msg-container">
        <div class="msg"></div>
      </div>
      
      <div class="user-card">
        <span class="user-badge">Active Session</span>
        <div class="user-info">
          <span class="label">ID:</span>
          <span id="username" class="val"></span>
        </div>
      </div>

      <div class="action-buttons">
        <button id="dreamhack-btn" type="button" class="btn-cyan">Dreamhack 로그인 연동</button>
        <button id="signout-btn" type="button" class="btn-danger">Sign Out</button>
      </div>
    </section>
  </main>
</body>
</html>
