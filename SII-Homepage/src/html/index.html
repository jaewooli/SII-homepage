<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="SII - Security Study Group in Inha University">
    <title>SII - Security Study Group</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Fira+Code:wght@400;500;700&family=Outfit:wght@300;400;500;700&display=swap" rel="stylesheet">
    <script type="module" src="/assets/js/index.js"></script>
    <link rel="stylesheet" href="/assets/css/style.css">
    <link rel="stylesheet" href="/assets/css/toast.css">
</head>
<body>
    <!-- Top System Telemetry Bar -->
    <div class="system-status-bar">
        <span class="status-indicator"><span class="status-ping-dot"></span>SYS_STATUS: ONLINE</span>
        <span class="system-title-tag">// SECUR_SYSTEMS_PORTAL.EXE</span>
        <span class="system-time" id="sys-time">UTC 2026.05.31</span>
    </div>

    <header>
        <div class="header-left">
            <img src="/images/sii-logo.png" alt="SII Logo">
            <div class="logo-text">
                <span class="logo-main">SII</span>
                <span class="logo-sub">INHA SECURITY RESEARCH</span>
            </div>
        </div>
        <nav></nav>
    </header>

    <main>
        <aside>
            <div class="sidebar-header">
                <span class="sidebar-term-symbol">></span> TERMINAL_MENU
            </div>
            <ul>
                <li><a href="#curriculum" class="nav-item-link"><span class="nav-num">01</span> CURRICULUM</a></li>
                <li><a href="#seminar" class="nav-item-link"><span class="nav-num">02</span> SEMINAR</a></li>
                <li><a href="#ctf" class="nav-item-link"><span class="nav-num">03</span> CTF CHALLENGE</a></li>
                <li><a href="/dreamhack" class="nav-item-link"><span class="nav-num">04</span> DREAMHACK</a></li>
            </ul>
            
            <div class="sidebar-footer">
                <span class="sidebar-desc">// RESEARCH LAB //</span>
            </div>
        </aside>

        <section id="view" class="site-view" aria-live="polite"></section>

        <template id='tpl-home'>
            <section class="page-home">
                <h2>Welcome to SII</h2>
                <p>SII에 오신 걸 환영합니다</p>
            </section>
        </template>
    </main>

    <script>
        // Real-time system bar ticker
        function updateSysTime() {
            const timeEl = document.getElementById('sys-time');
            if (timeEl) {
                const now = new Date();
                const pad = (n) => String(n).padStart(2, '0');
                const y = now.getFullYear();
                const m = pad(now.getMonth() + 1);
                const d = pad(now.getDate());
                const h = pad(now.getHours());
                const min = pad(now.getMinutes());
                const s = pad(now.getSeconds());
                timeEl.textContent = `SYS_TIME: ${y}.${m}.${d} ${h}:${min}:${s}`;
            }
        }
        setInterval(updateSysTime, 1000);
        updateSysTime();
    </script>
</body>
</html>
