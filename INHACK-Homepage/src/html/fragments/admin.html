<section class="page-admin animate-fade-in" style="width: 100%; max-width: 1200px; margin: 0 auto;">
    <div class="terminal-banner" style="margin-bottom: 1.5rem;">
        <h2 class="hero-title" style="color: #ff4b4b;">ADMIN CONTROL PANEL</h2>
        <p class="lead-text">인핵 포탈의 사용자 계정 관리 및 사이트 주요 섹션 컨텐츠를 실시간으로 제어합니다.</p>
    </div>

    <!-- Tab Navigation Bar -->
    <div class="admin-tab-nav">
        <button type="button" class="admin-tab-btn active" data-tab="content">🖥️ 섹션 컨텐츠 관리</button>
        <button type="button" class="admin-tab-btn" data-tab="users">👥 사용자 계정 관리</button>
    </div>

    <!-- Tab 1 Pane: Content Modification -->
    <div id="admin-pane-content" class="admin-tab-pane active">
        <div class="log-card" style="padding: 2rem; background-color: var(--bg-surface); border: 1px solid rgba(59, 130, 246, 0.15); display: flex; flex-direction: column;">
            <div class="log-card-title" style="color: var(--color-cyan); font-size: 0.95rem; margin-bottom: 1.5rem;">섹션 컨텐츠 관리 (JSON 데이터)</div>
            
            <div style="display: flex; flex-direction: column; gap: 6px; margin-bottom: 1rem;">
                <label for="admin-edit-section" style="font-size: 0.75rem; color: #64748b;">수정할 섹션 선택</label>
                <select id="admin-edit-section">
                    <option value="home">동아리 소개 (Home)</option>
                    <option value="curriculum">Curriculum</option>
                    <option value="seminar">Seminar</option>
                    <option value="ctf">CTF Challenge</option>
                </select>
            </div>

            <div style="display: flex; flex-direction: column; gap: 6px; margin-bottom: 1rem;">
                <label style="font-size: 0.75rem; color: #64748b;">구조화 데이터 (.json) 파일 업로드</label>
                <div style="display: flex; gap: 10px; align-items: center;">
                    <input type="file" id="admin-md-file" accept=".json" style="display: none;">
                    <button type="button" id="admin-upload-trigger-btn" class="action-btn">JSON 파일 선택</button>
                    <span id="admin-md-filename" style="font-size: 0.75rem; color: #475569; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 150px;">선택된 파일 없음</span>
                </div>
            </div>

            <div class="admin-editor-workspace">
                <div style="display: flex; flex-direction: column; gap: 6px; border-right: 1px solid rgba(255,255,255,0.05); padding-right: 1rem;">
                    <label style="font-size: 0.75rem; color: #64748b;">블록 계층 구조 (Block List)</label>
                    <div id="admin-block-list" style="flex: 1; display: flex; flex-direction: column; gap: 8px; max-height: 500px; overflow-y: auto; padding: 6px; background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.05); border-radius: 4px;">
                        <!-- Block list items will be generated dynamically -->
                    </div>
                </div>
                <div style="display: flex; flex-direction: column; gap: 6px;">
                    <label style="font-size: 0.75rem; color: #64748b;">비주얼 블록 에디터 (Visual Block Editor)</label>
                    <div class="block-toolbar" style="display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 12px; padding: 10px; background: rgba(15, 23, 42, 0.4); border: 1px solid rgba(59, 130, 246, 0.15); border-radius: 6px;">
                        <button type="button" class="tool-btn" data-block-type="banner">📢 배너 (Banner)</button>
                        <button type="button" class="tool-btn" data-block-type="header">🏷️ 헤더 (Header)</button>
                        <button type="button" class="tool-btn" data-block-type="spacer">↕️ 여백 (Spacer)</button>
                        <button type="button" class="tool-btn" data-block-type="features">🎴 카드 그리드 (Features)</button>
                        <button type="button" class="tool-btn" data-block-type="phases">🗺️ 커리큘럼 (Roadmap)</button>
                        <button type="button" class="tool-btn" data-block-type="timeline">📅 세미나 (Timeline)</button>
                        <button type="button" class="tool-btn" data-block-type="ctf_dashboard">🏆 CTF 대시보드 (CTF)</button>
                    </div>
                    <div id="admin-block-form-container" style="flex: 1; display: flex; flex-direction: column; gap: 1rem; max-height: 420px; min-height: 420px; overflow-y: auto; padding: 1.5rem; background: #080b12; border: 1px solid rgba(255,255,255,0.08); border-radius: 4px; color: #fff;">
                        <div style="color: #64748b; font-size: 0.8rem; text-align: center; margin-top: 50px;">왼쪽에서 편집할 블록을 선택하거나 새로운 블록을 추가해 주세요.</div>
                    </div>
                </div>
                <div style="display: flex; flex-direction: column; gap: 6px;">
                    <label style="font-size: 0.75rem; color: #64748b;">실시간 렌더링 미리보기 (Live Preview)</label>
                    <div id="admin-html-preview" class="preview-box" style="width: 100%; height: 100%; min-height: 420px; padding: 12px; background: #0f172a; border: 1px solid rgba(255,255,255,0.05); border-radius: 4px; overflow-y: auto; color: #fff; font-size: 0.9rem; line-height: 1.6;">
                        <!-- Rendered HTML will appear here -->
                    </div>
                </div>
            </div>

            <button type="button" id="admin-save-content-btn" class="action-btn">변경 사항 저장</button>
        </div>
    </div>

    <!-- Tab 2 Pane: User Account Management -->
    <div id="admin-pane-users" class="admin-tab-pane">
        <div class="logs-grid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; grid-auto-rows: min-content;">
            <!-- Card 1: User Registration -->
            <div class="log-card" style="padding: 2rem; background-color: var(--bg-surface); border: 1px solid rgba(255, 75, 75, 0.15); display: flex; flex-direction: column;">
                <div class="log-card-title" style="color: #ff4b4b; font-size: 0.95rem; margin-bottom: 1.5rem;">신규 사용자 계정 등록</div>
                <form id="admin-register-form" style="display: flex; flex-direction: column; gap: 1rem;">
                    <div style="display: flex; flex-direction: column; gap: 6px;">
                        <label for="admin-reg-username" style="font-size: 0.75rem; color: #64748b;">아이디 (Username)</label>
                        <input type="text" id="admin-reg-username" placeholder="사용자 ID 입력" required>
                    </div>
                    <div style="display: flex; flex-direction: column; gap: 6px;">
                        <label for="admin-reg-name" style="font-size: 0.75rem; color: #64748b;">성명/닉네임 (Name)</label>
                        <input type="text" id="admin-reg-name" placeholder="홍길동" required>
                    </div>
                    <div style="display: flex; flex-direction: column; gap: 6px;">
                        <label for="admin-reg-password" style="font-size: 0.75rem; color: #64748b;">비밀번호 (Password)</label>
                        <input type="password" id="admin-reg-password" placeholder="비밀번호 입력" required>
                    </div>
                    <button type="submit" class="action-btn">계정 생성</button>
                </form>
            </div>

            <!-- Card 3: User List and Deletion -->
            <div class="log-card" style="padding: 2rem; background-color: var(--bg-surface); border: 1px solid rgba(168, 85, 247, 0.15); display: flex; flex-direction: column;">
                <div class="log-card-title" style="color: #a855f7; font-size: 0.95rem; margin-bottom: 1.5rem;">등록된 사용자 목록 및 삭제</div>
                <div style="flex: 1; display: flex; flex-direction: column;">
                    <div style="display: flex; border-bottom: 1px solid rgba(255,255,255,0.08); padding-bottom: 8px; font-size: 0.75rem; color: #64748b; font-weight: 600;">
                        <div style="flex: 1;">아이디 (Username)</div>
                        <div style="flex: 1;">이름 (Name)</div>
                        <div style="width: 60px; text-align: center;">작업</div>
                    </div>
                    <div id="admin-user-list-container" style="max-height: 380px; overflow-y: auto; display: flex; flex-direction: column; gap: 6px; margin-top: 8px;">
                        <div style="text-align: center; color: #64748b; padding: 20px; font-size: 0.8rem;">사용자 목록 불러오는 중...</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
