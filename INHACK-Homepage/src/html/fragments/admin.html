<section class="page-admin animate-fade-in" style="width: 100%; max-width: 900px; margin: 0 auto;">
    <div class="terminal-banner" style="margin-bottom: 2rem;">
        <h2 class="hero-title" style="color: #ff4b4b;">ADMIN CONTROL PANEL</h2>
        <p class="lead-text">인핵 포탈의 사용자 계정 관리 및 사이트 주요 섹션 컨텐츠를 실시간으로 제어합니다.</p>
    </div>

    <div class="logs-grid">
        <!-- Card 1: User Registration -->
        <div class="log-card" style="padding: 2rem; background-color: var(--bg-surface); border: 1px solid rgba(255, 75, 75, 0.15); display: flex; flex-direction: column;">
            <div class="log-card-title" style="color: #ff4b4b; font-size: 0.95rem; margin-bottom: 1.5rem;">신규 사용자 계정 등록</div>
            <form id="admin-register-form" style="display: flex; flex-direction: column; gap: 1rem;">
                <div style="display: flex; flex-direction: column; gap: 6px;">
                    <label for="admin-reg-username" style="font-size: 0.75rem; color: #64748b;">아이디 (Username)</label>
                    <input type="text" id="admin-reg-username" placeholder="사용자 ID 입력" style="padding: 10px; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.08); border-radius: 4px; color: #fff;" required>
                </div>
                <div style="display: flex; flex-direction: column; gap: 6px;">
                    <label for="admin-reg-name" style="font-size: 0.75rem; color: #64748b;">성명/닉네임 (Name)</label>
                    <input type="text" id="admin-reg-name" placeholder="홍길동" style="padding: 10px; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.08); border-radius: 4px; color: #fff;" required>
                </div>
                <div style="display: flex; flex-direction: column; gap: 6px;">
                    <label for="admin-reg-password" style="font-size: 0.75rem; color: #64748b;">비밀번호 (Password)</label>
                    <input type="password" id="admin-reg-password" placeholder="비밀번호 입력" style="padding: 10px; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.08); border-radius: 4px; color: #fff;" required>
                </div>
                <button type="submit" class="action-btn" style="border-color: #ff4b4b; color: #ff4b4b; margin-top: 1rem; width: 100%;">계정 생성</button>
            </form>
        </div>

        <!-- Card 2: Content Modification -->
        <div class="log-card" style="padding: 2rem; background-color: var(--bg-surface); border: 1px solid rgba(59, 130, 246, 0.15); display: flex; flex-direction: column;">
            <div class="log-card-title" style="color: var(--color-cyan); font-size: 0.95rem; margin-bottom: 1.5rem;">섹션 컨텐츠 HTML 수정</div>
            
            <div style="display: flex; flex-direction: column; gap: 6px; margin-bottom: 1rem;">
                <label for="admin-edit-section" style="font-size: 0.75rem; color: #64748b;">수정할 섹션 선택</label>
                <select id="admin-edit-section" style="padding: 10px; background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.08); border-radius: 4px; color: #fff; outline: none; cursor: pointer;">
                    <option value="home">동아리 소개 (Home)</option>
                    <option value="curriculum">Curriculum</option>
                    <option value="seminar">Seminar</option>
                    <option value="ctf">CTF Challenge</option>
                </select>
            </div>

            <div style="display: flex; flex-direction: column; gap: 6px; margin-bottom: 1rem;">
                <label style="font-size: 0.75rem; color: #64748b;">마크다운 (.md) 파일 업로드</label>
                <div style="display: flex; gap: 10px; align-items: center;">
                    <input type="file" id="admin-md-file" accept=".md" style="display: none;">
                    <button type="button" id="admin-upload-trigger-btn" class="action-btn" style="margin: 0; padding: 10px 14px; font-size: 0.75rem; border-color: #10b981; color: #10b981;">MD 파일 선택</button>
                    <span id="admin-md-filename" style="font-size: 0.75rem; color: #475569; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 150px;">선택된 파일 없음</span>
                </div>
            </div>

            <div style="display: flex; flex-direction: column; gap: 6px; flex: 1;">
                <label for="admin-edit-content" style="font-size: 0.75rem; color: #64748b;">HTML 코드 편집</label>
                <textarea id="admin-edit-content" style="width: 100%; height: 260px; min-height: 200px; padding: 12px; background: #080b12; border: 1px solid rgba(255,255,255,0.08); border-radius: 4px; color: #00f0ff; font-family: 'Fira Code', monospace; font-size: 0.8rem; line-height: 1.5; resize: vertical; outline: none;"></textarea>
            </div>

            <button type="button" id="admin-save-content-btn" class="action-btn" style="border-color: var(--color-cyan); color: var(--color-cyan); margin-top: 1.5rem; width: 100%;">변경 사항 저장</button>
        </div>

        <!-- Card 3: User List and Deletion -->
        <div class="log-card" style="padding: 2rem; background-color: var(--bg-surface); border: 1px solid rgba(168, 85, 247, 0.15); display: flex; flex-direction: column;">
            <div class="log-card-title" style="color: #a855f7; font-size: 0.95rem; margin-bottom: 1.5rem;">등록된 사용자 목록 및 삭제</div>
            <div style="flex: 1; display: flex; flex-direction: column;">
                <div style="display: flex; border-bottom: 1px solid rgba(255,255,255,0.08); padding-bottom: 8px; font-size: 0.75rem; color: #64748b; font-weight: 600;">
                    <div style="flex: 1;">아이디 (Username)</div>
                    <div style="flex: 1;">이름 (Name)</div>
                    <div style="width: 60px; text-align: center;">작업</div>
                </div>
                <div id="admin-user-list-container" style="max-height: 380px; overflow-y: auto; display: flex; flex-direction: column; gap: 6px; margin-top: 8px;">
                    <!-- Dynamically populated via JS -->
                    <div style="text-align: center; color: #64748b; padding: 20px; font-size: 0.8rem;">사용자 목록 불러오는 중...</div>
                </div>
            </div>
        </div>
    </div>
</section>
