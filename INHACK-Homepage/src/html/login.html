<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="INHACK - Gateway Authorization">
    <title>INHACK Gateway Auth</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Fira+Code:wght@400;500;700&family=Outfit:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/assets/css/auth.css">
    <link rel="stylesheet" href="/assets/css/toast.css">
    <script type="module" src="/assets/js/auth.js"></script>
</head>
<body>
    <h1>Portal Login // <a href="/homepage">INHACK</a></h1>

    <section id="login"> 
        <h2>Sign In</h2>
        <form id="login-form" action="/login" method="POST">
            <label for="login-username">Username:</label>
            <input type="text" id="login-username" name="username" placeholder="Enter username" required>

            <label for="login-password">Password:</label>
            <input type="password" id="login-password" name="password" placeholder="Enter password" required>

            <button id="login-btn" type="submit">Sign In</button>
        </form>
        <p>Not registered? <a href="mailto:jaeu1341@naver.com?subject=[INHACK Homepage] Support / Account Request">Contact Support</a></p>
    </section>
</body>
</html>
