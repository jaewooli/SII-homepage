<!DOCTYPE html>
<html lang="ko">
<head>
    <!-- INCLUDE: head.html -->
    <meta name="description" content="INHACK - 마이페이지">
    <title>INHACK - 마이페이지</title>
    <link rel="stylesheet" href="/assets/css/style.css?v=2026060402">
    <link rel="stylesheet" href="/assets/css/auth.css?v=2026060402">
    <link rel="stylesheet" href="/assets/css/toast.css?v=2026060402">
    <link rel="stylesheet" href="/assets/css/mypage.css?v=2026060402">
    <script type="module" src="/assets/js/header.js"></script>
    <script type="module" src="/assets/js/mypage.js?v=2026060402"></script>
</head>
<body>
    <header>
        <!-- INCLUDE: header.html -->
    </header>

    <main>
        <!-- INCLUDE: aside.html -->

        <section id="view" class="site-view" aria-live="polite">
            <div class="mypage-wrapper">
                <h1 style="font-size:1.6rem; font-weight:700; color:#e8e8f0; margin:0 0 4px;">마이페이지</h1>

                <!-- Profile summary -->
                <div class="profile-card" id="profile-card">
                    <div class="profile-avatar" id="profile-avatar">?</div>
                    <div class="profile-info">
                        <span class="profile-name" id="profile-name">로딩 중...</span>
                        <span class="profile-username" id="profile-username"></span>
                        <span class="profile-badge badge-member" id="profile-badge">일반 회원</span>
                    </div>
                </div>

                <!-- Account info -->
                <div class="section-card">
                    <div class="section-header">계정 정보</div>
                    <div class="section-body">
                        <div class="info-grid">
                            <span class="info-label">아이디</span>
                            <span class="info-value mono" id="info-username">—</span>
                            <span class="info-label">이름</span>
                            <span class="info-value" id="info-name">—</span>
                            <span class="info-label">역할</span>
                            <span class="info-value" id="info-role">—</span>
                        </div>
                    </div>
                </div>

                <!-- Change password -->
                <div class="section-card">
                    <div class="section-header">비밀번호 변경</div>
                    <div class="section-body">
                        <form class="form-stack" id="change-pw-form" autocomplete="off">
                            <div class="form-field">
                                <label for="cur-pw">현재 비밀번호</label>
                                <input type="password" id="cur-pw" placeholder="현재 비밀번호 입력" autocomplete="current-password">
                            </div>
                            <div class="form-field">
                                <label for="new-pw">새 비밀번호</label>
                                <input type="password" id="new-pw" placeholder="새 비밀번호 입력" autocomplete="new-password">
                                <div class="pw-strength-bar">
                                    <div class="pw-strength-fill" id="pw-strength-fill"></div>
                                </div>
                                <span class="pw-strength-label" id="pw-strength-label"></span>
                                <span class="pw-hint">최소 8자 · 대문자 · 소문자 · 숫자 · 특수문자 각 1개 이상</span>
                            </div>
                            <div class="form-field">
                                <label for="confirm-pw">새 비밀번호 확인</label>
                                <input type="password" id="confirm-pw" placeholder="새 비밀번호 재입력" autocomplete="new-password">
                            </div>
                            <button type="submit" class="submit-btn" id="change-pw-btn">비밀번호 변경</button>
                        </form>
                    </div>
                </div>
            </div>
        </section>
    </main>
</body>
</html>
